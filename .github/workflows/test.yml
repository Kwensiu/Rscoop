name: Test Build

on:
  push:
    branches:
      - test

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    env:
      NODE_VERSION: '20'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      # Cache Rust dependencies and build artifacts (cargo registry, git, and target dir)
      # Swatinem/rust-cache handles lockfile hashing and cache priming automatically.
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install system dependencies (UPX)
        run: choco install upx -y

      - name: Install project dependencies
        run: npm ci

      # One command builds frontend, compiles Rust, and bundles installers
      # Remove public key from config to completely disable signing
      - name: Prepare config for unsigned build
        run: |
          # Create a temporary config without public key
          $config = Get-Content "src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json
          $originalPubkey = $config.plugins.updater.pubkey
          $config.plugins.updater.pubkey = ""
          $config | ConvertTo-Json -Depth 10 | Out-File "src-tauri/tauri-no-sign.json" -Encoding utf8
          Write-Host "Original pubkey temporarily removed for build"
          
      - name: Build & bundle application (Tauri)
        run: |
          # Use the config without public key
          Copy-Item "src-tauri/tauri-no-sign.json" "src-tauri/tauri.conf.json" -Force
          npm run tauri build
          
      - name: Restore original config
        run: |
          # Restore the original config (in case needed for other steps)
          $config = Get-Content "src-tauri/tauri-no-sign.json" -Raw | ConvertFrom-Json
          $config.plugins.updater.pubkey = "dW50cnVzdGVkIGNvbW1lbnQ6IG1pbmlzaWduIHB1YmxpYyBrZXkgREUzNDBBOUZCRkZGMzg5Qg0KUldTYk9QKy9ud28wM21SRUdEd25sNXdtNXZyZVFZcWNFUDN3MDVUdEhGSHRKVXowVmVQbHVCUVcNCg=="
          $config | ConvertTo-Json -Depth 10 | Out-File "src-tauri/tauri.conf.json" -Encoding utf8
          Write-Host "Original pubkey restored"

      - name: Extract metadata (product name & version)
        id: meta
        shell: pwsh
        run: |
          $cfg = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          "version=$($cfg.version)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "product=$($cfg.productName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Compress executable with UPX
        run: upx --best --lzma src-tauri/target/release/${{ steps.meta.outputs.product }}.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.product }}-${{ steps.meta.outputs.version }}-test-build
          path: |
            ./src-tauri/target/release/${{ steps.meta.outputs.product }}.exe
            ./src-tauri/target/release/bundle/msi/${{ steps.meta.outputs.product }}_${{ steps.meta.outputs.version }}_x64_en-US.msi