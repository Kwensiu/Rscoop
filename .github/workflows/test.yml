name: Test Build

on:
  push:
    branches:
      - test

permissions:
  contents: write

env:
  NODE_VERSION: '20'
  RUST_TOOLCHAIN: 'stable'

jobs:
  build:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      product: ${{ steps.meta.outputs.product }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-v${{ env.NODE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-v${{ env.NODE_VERSION }}-
            ${{ runner.os }}-node-

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
          key: ${{ runner.os }}-rust-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install UPX
        uses: crazy-max/ghaction-upx@v3
        with:
          install-only: true

      - name: Install project dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Extract metadata
        id: meta
        shell: pwsh
        run: |
          $cfg = Get-Content src-tauri/tauri.conf.test.json | ConvertFrom-Json
          "version=$($cfg.version)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "product=$($cfg.productName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build & bundle application (Tauri)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $env:CARGO_TERM_COLOR = "always"
          $env:RUSTFLAGS = "-C target-cpu=native"
          npm run tauri -- build --config src-tauri/tauri.conf.test.json --verbose

      - name: Compress executable with UPX
        if: ${{ steps.meta.outputs.product != '' }}
        run: |
          $exePath = "src-tauri/target/release/${{ steps.meta.outputs.product }}.exe"
          if (Test-Path $exePath) {
            upx --best --lzma $exePath
          } else {
            Write-Host "Executable not found at $exePath, skipping compression"
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.product }}-${{ steps.meta.outputs.version }}-build
          retention-days: 7
          path: |
            ./src-tauri/target/release/${{ steps.meta.outputs.product }}.exe
            ./src-tauri/target/release/bundle/msi/
          if-no-files-found: error

